<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MinsuGPT Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap');
    * { box-sizing: border-box; font-family: 'Google Sans Flex', sans-serif; }
    body { margin: 0; background: #f4f6fb; color: #1f2937; }
    .container { max-width: 1100px; margin: 0 auto; padding: 18px; }
    .card { background: #fff; border: 1px solid #ecf0f6; border-radius: 22px; box-shadow: 0 10px 28px rgba(15,23,42,.06); padding: 16px; margin-bottom: 12px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    input, button { border: 1px solid #d7dfeb; border-radius: 14px; padding: 9px 12px; font-size: 14px; }
    button { cursor: pointer; background: #fff; }
    button.primary { background: #3182f6; border-color: #3182f6; color: #fff; }
    button.danger-soft {
      background: #ffecef;
      border-color: #ffd2da;
      color: #b4233c;
    }
    button.danger-soft:hover {
      background: #ffdfe6;
    }
    .hidden { display: none; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #eef2f7; padding: 9px 6px; text-align: left; vertical-align: top; }
    .muted { color: #6b7280; font-size: 12px; }
    pre { white-space: pre-wrap; word-break: break-word; margin: 0; font-size: 12px; }
    .typing-dots { position: relative; width: 34px; height: 14px; display: inline-block; }
    .typing-dots span { position: absolute; top: 4px; width: 7px; height: 7px; background: #111; border-radius: 50%; }
    .panel-loading {
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed #e2e8f0;
      border-radius: 12px;
      background: #fbfdff;
      margin-top: 8px;
    }
    .btn-loading-wrap { display: inline-flex; align-items: center; justify-content: center; width: 100%; }
    .btn-loading-wrap .typing-dots { transform: scale(.88); }
    .usage-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin: 10px 0; }
    .usage-chip { border: 1px solid #e8edf5; border-radius: 12px; background: #f8fbff; padding: 10px; }
    .usage-chip b { display: block; font-size: 18px; margin-top: 4px; }
    .sessions-list { display: grid; gap: 8px; margin-top: 8px; }
    .session-card { border: 1px solid #e8edf5; border-radius: 12px; padding: 10px; background: #fff; }
    .session-title { font-weight: 600; margin-bottom: 6px; }
    .session-meta { color: #6b7280; font-size: 12px; margin-bottom: 6px; }
    .confirm-backdrop {
      position: fixed; inset: 0; z-index: 2000;
      display: none; align-items: center; justify-content: center;
      background: rgba(15, 23, 42, .35);
      padding: 18px;
    }
    .confirm-backdrop.show { display: flex; }
    .confirm-card {
      width: min(360px, 92vw);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      box-shadow: 0 18px 48px rgba(15,23,42,.22);
      padding: 16px;
    }
    .confirm-title { margin: 0 0 8px; font-size: 16px; }
    .confirm-desc { margin: 0 0 12px; color: #6b7280; font-size: 13px; line-height: 1.45; }
  </style>
</head>
<body>
  <div class="container">
    <div id="dashboard">
      <div class="card">
        <div class="row" style="justify-content:space-between;">
          <h2 style="margin:0;">MinsuGPT Admin</h2>
          <button id="adminLogoutBtn">로그아웃</button>
        </div>
        <div class="row" style="margin-top:8px;">
          <button class="primary" id="loadUsersBtn">유저 불러오기</button>
          <span class="muted" id="status">상태: 대기</span>
        </div>
      </div>

      <div class="card">
        <h3 style="margin:0 0 10px;">계정 관리</h3>
        <table id="usersTable">
          <thead><tr><th>ID</th><th>계정</th><th>상태</th><th>작업</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="card">
        <h3 style="margin:0 0 10px;">선택 유저 사용량/채팅</h3>
        <div class="row" style="margin-bottom:8px;">
          <input id="targetUserId" placeholder="유저 ID" style="width:120px;" />
          <button id="usageBtn">사용량 조회</button>
          <button id="sessionsBtn">채팅 기록 불러오기</button>
        </div>
        <div id="usageBox"></div>
        <div id="sessionsBox" class="sessions-list"></div>
      </div>
    </div>
  </div>
  <div id="confirmModal" class="confirm-backdrop">
    <div class="confirm-card">
      <h3 id="confirmTitle" class="confirm-title">확인</h3>
      <p id="confirmDesc" class="confirm-desc">작업을 진행할까요?</p>
      <div class="row" style="justify-content:flex-end;">
        <button id="confirmCancelBtn" type="button">취소</button>
        <button id="confirmOkBtn" class="danger-soft" type="button">확인</button>
      </div>
    </div>
  </div>

  <script>
    const ROOT_LOGIN_URL = 'https://minsugpt.kro.kr/login?mode=admin';
    const AUTH_BASE = 'https://jaewondev6.pythonanywhere.com';
    const AUTH_STORAGE_KEY = 'minsugpt_auth_v1';
    const AUTH_VERIFY_INTERVAL_MS = 12000;
    const dashboard = document.getElementById('dashboard');
    const statusEl = document.getElementById('status');
    const usersBody = document.querySelector('#usersTable tbody');
    const usageBox = document.getElementById('usageBox');
    const sessionsBox = document.getElementById('sessionsBox');
    const targetUserId = document.getElementById('targetUserId');
    const confirmModal = document.getElementById('confirmModal');
    const confirmTitle = document.getElementById('confirmTitle');
    const confirmDesc = document.getElementById('confirmDesc');
    const confirmOkBtn = document.getElementById('confirmOkBtn');
    const confirmCancelBtn = document.getElementById('confirmCancelBtn');
    let token = '';
    let confirmResolver = null;
    const SLOT_X = [0, 11, 22];
    const panelAnimStops = new Set();
    let authSyncTimer = null;
    let authSyncInFlight = false;

    function headers(json) {
      const h = { Authorization: 'Bearer ' + token };
      if (json) h['Content-Type'] = 'application/json';
      return h;
    }
    async function call(path, opts) {
      const res = await fetch(AUTH_BASE + path, opts || {});
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || data.message || ('HTTP ' + res.status));
      return data;
    }
    function readStoredSession() {
      const raw = localStorage.getItem(AUTH_STORAGE_KEY);
      if (!raw) return null;
      try {
        const parsed = JSON.parse(raw);
        if (!parsed || !parsed.token) return null;
        return parsed;
      } catch {
        return null;
      }
    }
    function logoutToRootLogin() {
      token = '';
      if (authSyncTimer) {
        clearInterval(authSyncTimer);
        authSyncTimer = null;
      }
      localStorage.removeItem(AUTH_STORAGE_KEY);
      window.location.replace(ROOT_LOGIN_URL);
    }
    async function verifyAdminSession(quiet) {
      if (authSyncInFlight) return false;
      const session = readStoredSession();
      if (!session || !session.token) {
        logoutToRootLogin();
        return false;
      }
      authSyncInFlight = true;
      token = session.token;
      try {
        const verify = await call('/api/auth/verify', { headers: headers(false) });
        if (!verify || !verify.user || verify.user.username !== 'admin') {
          logoutToRootLogin();
          return false;
        }
        return true;
      } catch (e) {
        if (!quiet) console.error('admin verify failed', e);
        logoutToRootLogin();
        return false;
      } finally {
        authSyncInFlight = false;
      }
    }
    function startAuthSyncWatchers() {
      if (authSyncTimer) return;
      authSyncTimer = setInterval(() => {
        verifyAdminSession(true).catch(() => {});
      }, AUTH_VERIFY_INTERVAL_MS);
      window.addEventListener('focus', () => {
        verifyAdminSession(true).catch(() => {});
      });
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          verifyAdminSession(true).catch(() => {});
        }
      });
      window.addEventListener('storage', (e) => {
        if (e.key !== AUTH_STORAGE_KEY) return;
        const session = readStoredSession();
        if (!session || !session.token) {
          logoutToRootLogin();
          return;
        }
        token = session.token;
        verifyAdminSession(true).catch(() => {});
      });
    }
    function setStatus(msg) { statusEl.textContent = '상태: ' + msg; }
    function createTypingDots() {
      const dots = document.createElement('div');
      dots.className = 'typing-dots';
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('span');
        dot.style.transform = 'translate(' + SLOT_X[i] + 'px, 0px)';
        dots.appendChild(dot);
      }
      return dots;
    }
    function startDotsAnimation(container) {
      const dots = Array.from(container.querySelectorAll('span'));
      if (dots.length < 3) return () => {};
      const xPos = [SLOT_X[0], SLOT_X[1], SLOT_X[2]];
      const pairs = [[0,1],[1,2],[0,2]];
      const BOUNCE_MS = 1100, MOVE_MS = 520, CYCLE_MS = BOUNCE_MS + MOVE_MS;
      const t0 = performance.now();
      let raf = null, committed = -1;
      function arcY(t, sign) { return sign * 7 * 4 * t * (1 - t); }
      function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2)/2; }
      function tick(now) {
        const elapsed = now - t0;
        const cycleNum = Math.floor(elapsed / CYCLE_MS);
        const local = elapsed - cycleNum * CYCLE_MS;
        const pair = pairs[cycleNum % pairs.length];
        const a = pair[0], b = pair[1];
        if (local < BOUNCE_MS) {
          const bt = local / 1000;
          dots.forEach((d, i) => {
            const y = Math.sin(bt * 4.2 + i * 0.85) * 4;
            d.style.transform = 'translate(' + xPos[i] + 'px,' + y + 'px)';
          });
        } else {
          const st = Math.min(1, (local - BOUNCE_MS) / MOVE_MS);
          const e = easeInOut(st);
          const fromA = xPos[a], fromB = xPos[b];
          const xA = fromA + (fromB - fromA) * e;
          const xB = fromB + (fromA - fromB) * e;
          dots.forEach((d, i) => {
            let x = xPos[i], y = 0;
            if (i === a) { x = xA; y = arcY(e, -1); }
            else if (i === b) { x = xB; y = arcY(e, 1); }
            d.style.transform = 'translate(' + x + 'px,' + y + 'px)';
          });
          if (st >= 1 && committed !== cycleNum) {
            const tmp = xPos[a]; xPos[a] = xPos[b]; xPos[b] = tmp; committed = cycleNum;
          }
        }
        raf = requestAnimationFrame(tick);
      }
      raf = requestAnimationFrame(tick);
      return () => { if (raf) cancelAnimationFrame(raf); };
    }
    function setButtonLoading(btn, loading) {
      if (!btn) return;
      if (loading) {
        btn.dataset.originalHtml = btn.innerHTML;
        btn.disabled = true;
        const dots = createTypingDots();
        const wrap = document.createElement('span');
        wrap.className = 'btn-loading-wrap';
        wrap.appendChild(dots);
        btn.innerHTML = '';
        btn.appendChild(wrap);
        const stop = startDotsAnimation(dots);
        btn._stopDots = stop;
      } else {
        if (btn._stopDots) btn._stopDots();
        btn._stopDots = null;
        btn.disabled = false;
        if (btn.dataset.originalHtml) btn.innerHTML = btn.dataset.originalHtml;
      }
    }
    function showPanelLoading(targetEl) {
      if (!targetEl) return () => {};
      const holder = document.createElement('div');
      holder.className = 'panel-loading';
      const dots = createTypingDots();
      holder.appendChild(dots);
      targetEl.innerHTML = '';
      targetEl.appendChild(holder);
      const stop = startDotsAnimation(dots);
      panelAnimStops.add(stop);
      return () => {
        stop();
        panelAnimStops.delete(stop);
        if (holder.parentNode) holder.remove();
      };
    }
    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
    }
    function openConfirm(title, desc) {
      confirmTitle.textContent = title || '확인';
      confirmDesc.textContent = desc || '작업을 진행할까요?';
      confirmModal.classList.add('show');
      return new Promise((resolve) => { confirmResolver = resolve; });
    }
    function closeConfirm(result) {
      if (confirmResolver) {
        confirmResolver(result);
        confirmResolver = null;
      }
      confirmModal.classList.remove('show');
    }
    confirmOkBtn.addEventListener('click', () => closeConfirm(true));
    confirmCancelBtn.addEventListener('click', () => closeConfirm(false));
    confirmModal.addEventListener('click', (e) => { if (e.target === confirmModal) closeConfirm(false); });

    async function bootstrapAuth() {
      const hash = window.location.hash || '';
      if (hash.startsWith('#auth=')) {
        const encoded = decodeURIComponent(hash.slice(6));
        try {
          const json = decodeURIComponent(escape(atob(encoded)));
          const parsed = JSON.parse(json);
          if (parsed && parsed.token) {
            localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(parsed));
          }
        } catch (e) {
          console.error('admin auth payload decode failed', e);
        }
        history.replaceState({}, '', window.location.pathname + window.location.search);
      }
      const raw = localStorage.getItem(AUTH_STORAGE_KEY);
      if (!raw) {
        window.location.replace(ROOT_LOGIN_URL);
        return false;
      }
      let parsed = null;
      try {
        parsed = JSON.parse(raw);
      } catch {
        window.location.replace(ROOT_LOGIN_URL);
        return false;
      }
      if (!parsed || !parsed.token) {
        window.location.replace(ROOT_LOGIN_URL);
        return false;
      }
      token = parsed.token;
      return verifyAdminSession(false);
    }

    async function loadUsers() {
      setStatus('유저 목록 로딩 중...');
      const stopLoading = showPanelLoading(usersBody);
      const data = await call('/api/admin/users', { headers: headers(false) });
      usersBody.innerHTML = '';
      (data.users || []).forEach((u) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.id}</td>
          <td><b>${u.username}</b><div class="muted">${u.email}</div></td>
          <td>approved:${u.approved}<br>disabled:${u.disabled}<br>mustReset:${u.must_reset_password}</td>
          <td><div class="row">
            ${u.approved ? '' : `<button data-act="approve" data-id="${u.id}">승인</button>`}
            ${u.approved ? `<button data-act="revoke" data-id="${u.id}">승인취소</button>` : ''}
            <button class="${u.disabled ? '' : 'danger-soft'}" data-act="disable" data-id="${u.id}" data-next="${u.disabled ? 'false' : 'true'}">${u.disabled ? '활성화' : '비활성화'}</button>
            <button class="danger-soft" data-act="reset" data-id="${u.id}">비번초기화</button>
            <button class="danger-soft" data-act="delete" data-id="${u.id}">계정삭제</button>
          </div></td>`;
        usersBody.appendChild(tr);
      });
      stopLoading();
      setStatus('유저 목록 로딩 완료');
    }

    document.getElementById('adminLogoutBtn').addEventListener('click', () => {
      logoutToRootLogin();
    });
    document.getElementById('loadUsersBtn').addEventListener('click', async () => {
      try { await loadUsers(); } catch (e) { setStatus('오류: ' + e.message); }
    });
    usersBody.addEventListener('click', async (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const id = btn.dataset.id;
      const act = btn.dataset.act;
      setButtonLoading(btn, true);
      try {
        if (act === 'approve') await call('/api/admin/users/' + id + '/approve', { method: 'POST', headers: headers(false) });
        if (act === 'revoke') {
          const ok = await openConfirm('승인 취소', '이 계정을 다시 승인 대기 상태로 돌릴까요?');
          if (!ok) return;
          await call('/api/admin/users/' + id + '/revoke-approval', { method: 'POST', headers: headers(false) });
        }
        if (act === 'disable') {
          const nextDisabled = btn.dataset.next === 'true';
          const ok = await openConfirm(
            nextDisabled ? '계정 비활성화' : '계정 활성화',
            nextDisabled ? '이 계정 로그인을 차단할까요?' : '이 계정 로그인을 다시 허용할까요?'
          );
          if (!ok) return;
          await call('/api/admin/users/' + id + '/deactivate', { method: 'POST', headers: headers(true), body: JSON.stringify({ disabled: nextDisabled }) });
        }
        if (act === 'reset') {
          const ok = await openConfirm('비밀번호 초기화', '이 계정 비밀번호를 초기화할까요? 로그인 시 재설정이 필요해집니다.');
          if (!ok) return;
          const data = await call('/api/admin/users/' + id + '/reset-password', { method: 'POST', headers: headers(true), body: JSON.stringify({ tempPassword: '' }) });
          alert('초기화 완료. 임시 비밀번호: ' + data.tempPassword);
        }
        if (act === 'delete') {
          const ok = await openConfirm('계정 삭제', '정말 삭제할까요? 해당 유저의 채팅 기록도 함께 삭제됩니다.');
          if (!ok) return;
          await call('/api/admin/users/' + id, { method: 'DELETE', headers: headers(false) });
        }
        await loadUsers();
      } catch (err) {
        setStatus('오류: ' + err.message);
      } finally {
        setButtonLoading(btn, false);
      }
    });
    document.getElementById('usageBtn').addEventListener('click', async () => {
      const btn = document.getElementById('usageBtn');
      setButtonLoading(btn, true);
      const stopLoading = showPanelLoading(usageBox);
      try {
        const data = await call('/api/admin/users/' + targetUserId.value.trim() + '/usage', { headers: headers(false) });
        const u = data.usage || {};
        usageBox.innerHTML = `
          <div class="usage-grid">
            <div class="usage-chip">세션 수<b>${u.sessions || 0}</b></div>
            <div class="usage-chip">총 메시지<b>${u.messages || 0}</b></div>
            <div class="usage-chip">사용자 메시지<b>${u.userMessages || 0}</b></div>
            <div class="usage-chip">AI 메시지<b>${u.assistantMessages || 0}</b></div>
          </div>
        `;
      }
      catch (err) { setStatus('오류: ' + err.message); }
      finally { stopLoading(); setButtonLoading(btn, false); }
    });
    document.getElementById('sessionsBtn').addEventListener('click', async () => {
      const btn = document.getElementById('sessionsBtn');
      setButtonLoading(btn, true);
      const stopLoading = showPanelLoading(sessionsBox);
      try {
        const data = await call('/api/admin/users/' + targetUserId.value.trim() + '/sessions', { headers: headers(false) });
        const list = data.sessions || [];
        if (!list.length) {
          sessionsBox.innerHTML = '<div class="muted">채팅 기록이 없습니다.</div>';
          return;
        }
        sessionsBox.innerHTML = list.map((s) => {
          const preview = (s.messages || []).slice(-2).map((m) => `${m.role}: ${typeof m.content === 'string' ? m.content : '[assistant-version]'}`).join('\n');
          return `
            <div class="session-card">
              <div class="session-title">${escapeHtml(s.title || '새 채팅')}</div>
              <div class="session-meta">ID: ${escapeHtml(s.id)} · 업데이트: ${escapeHtml(s.updatedAt || '')}</div>
              <pre>${escapeHtml(preview || '(미리보기 없음)')}</pre>
            </div>
          `;
        }).join('');
      }
      catch (err) { setStatus('오류: ' + err.message); }
      finally { stopLoading(); setButtonLoading(btn, false); }
    });

    (async () => {
      const ok = await bootstrapAuth();
      if (!ok) return;
      startAuthSyncWatchers();
      await loadUsers();
    })();
  </script>
</body>
</html>
